version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      charmbracelet:
        patterns:
          - "github.com/charmbracelet/*"
      x-toolkit:
        patterns:
          - "golang.org/x/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
