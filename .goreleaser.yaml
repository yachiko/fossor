version: 2

project_name: fossor

before:
  hooks:
    - go mod tidy

builds:
  - id: fossor
    main: .
    binary: fossor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/yachiko/fossor/cmd.Version={{ .Version }}

archives:
  - id: fossor
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

# Publish a Homebrew formula to yachiko/homebrew-tap on every stable release.
# Token is minted per-run from the yachiko-homebrew-bot GitHub App in the
# release workflow; skip_upload:auto keeps prereleases out of the tap.
brews:
  - name: fossor
    repository:
      owner: yachiko
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    # After creating the yachiko-homebrew-bot App, set commit_author so tap
    # commits are attributed correctly. Email format is:
    #   <APP_ID>+yachiko-homebrew-bot[bot]@users.noreply.github.com
    # commit_author:
    #   name: yachiko-homebrew-bot[bot]
    #   email: <APP_ID>+yachiko-homebrew-bot[bot]@users.noreply.github.com
    commit_msg_template: "{{ .ProjectName }} {{ .Tag }}"
    homepage: "https://github.com/yachiko/fossor"
    description: "Terminal UI for managing multiple Git repositories from a single screen"
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "fossor"
    test: |
      system "#{bin}/fossor", "--version"

checksum:
  name_template: "checksums.txt"

# Keyless cosign signing of the checksums file. Produces a .pem
# certificate and a .sig signature alongside checksums.txt. Verifiable
# against the Rekor transparency log without needing a managed key.
# Requires `id-token: write` permission on the release workflow.
signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
